<!DOCTYPE html>
<html>
<head>
    <title>Trachys minutus Database</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Библиотека для CSV и кластеризации -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { margin:0; padding:0; }
        #map { position:absolute; top:0; bottom:0; width:100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([55.0, 37.0], 4); // Центр на Россию
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var markers = L.markerClusterGroup();

        // Загрузка CSV из папки data
        Papa.parse("data/trachys_min_occurences.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                var data = results.data;
                for (var i = 0; i < data.length; i++) {
                    var row = data[i];
                    // Проверка наличия координат
                    if (row["Широта"] && row["Долгота"]) {
                        var lat = parseFloat(row["Широта"]);
                        var lng = parseFloat(row["Долгота"]);
                        
                        if (!isNaN(lat) && !isNaN(lng)) {
                            var popupContent = `
                                <b>${row["Автор"] || 'N/A'}</b><br>
                                Год: ${row["Год публикации"] || 'N/A'}<br>
                                Место: ${row["Место"] || 'N/A'}<br>
                                <a href="${row["Ссылка"]}" target="_blank">Источник</a>
                            `;
                            var marker = L.marker([lat, lng]).bindPopup(popupContent);
                            markers.addLayer(marker);
                        }
                    }
                }
                map.addLayer(markers);
            }
        });
    </script>
</body>
</html>
